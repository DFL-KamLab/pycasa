site_name: pycasa
site_description: Python toolkit for computer-assisted semen analysis workflows.
site_url: https://dfl-kamlab.github.io/pycasa/
repo_url: https://github.com/DFL-KamLab/pycasa
repo_name: DFL-KamLab/pycasa

theme:
  name: material
  logo: assets/pycasa_logo.png
  favicon: assets/pycasa_logo.png
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - Getting Started:
    - Introduction: index.md
    - Setup & Requirements: getting-started/setup.md
    - Quickstart: getting-started/quickstart.md
  - Examples:
    - Default Data + Otsu + YOLO: examples/default-data-otsu-yolo.md
    - Load Custom Video: examples/custom-video.md
    - Detection + SORT Tracking: examples/detection-tracking.md
    - Motility + Assessment: examples/motility-assessment.md
  - API Guide:
    - Casa Session Model: api/casa-session.md
    - I/O: api/io.md
    - Preprocessing: api/preprocessing.md
    - Detection: api/detection.md
    - Tracking: api/tracking.md
    - Motility: api/motility.md
    - Assessment: api/assessment.md
    - Visualization: api/visualization.md
  - Project:
    - Package Architecture: project/architecture.md
    - Troubleshooting: project/troubleshooting.md
    - Contributors: project/contributors.md
